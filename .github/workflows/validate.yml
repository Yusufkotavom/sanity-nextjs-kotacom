name: Validate Template

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'studio/**'
      - '.github/workflows/validate.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
  pull_request:
    branches: [main, master, develop]
    paths:
      - 'studio/**'
      - '.github/workflows/validate.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Sanity Template
        uses: sanity-io/template-validator@v3
