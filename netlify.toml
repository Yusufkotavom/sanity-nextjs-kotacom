# Global Netlify Configuration for Monorepo
[build]
  command = "pnpm --filter frontend build"
  publish = "frontend/.next"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--version"
  PNPM_VERSION = "10.19.0"
  NEXT_DISABLE_NETLIFY_EDGE = "true"
  # Keep frontend function env under AWS Lambda 4KB limit by clearing
  # non-frontend secrets that are only needed by seo-dashboard/ops services.
  AI_GATEWAY_API_KEY = ""
  CRON_SECRET = ""
  DATABASE_URL = ""
  GSC_CLIENT_EMAIL = ""
  GSC_PRIVATE_KEY = ""
  GSC_SITE_URL = ""
  GSC_SITEMAP_URL = ""
  INDEXNOW_ENDPOINT = ""
  INDEXNOW_KEY = ""
  INDEXNOW_KEY_LOCATION = ""
  INTERNAL_API_SECRET = ""
  SEO_DASHBOARD_PASSWORD = ""
  SEO_SESSION_SECRET = ""
  SEO_SETTINGS_ENCRYPTION_KEY = ""
  UPSTASH_REDIS_REST_TOKEN = ""
  UPSTASH_REDIS_REST_URL = ""

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["next", "react", "react-dom"]

# Configuration for Sanity Studio (if deployed as a separate site)
# Set Base Directory to "studio" in Netlify UI
# Build command: "pnpm build"
# Publish directory: "studio/dist"

# Configuration for SEO Dashboard (if deployed as a separate site)
# Set Base Directory to "seo-dashboard" in Netlify UI
# Build command: "pnpm build"
# Publish directory: "seo-dashboard/.next"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
